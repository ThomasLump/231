<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>home</title>
</head>
<body>
<h1>HELLO</h1>
<h2>add menu</h2>
    <!--/*@thymesVar id="addeduser" type="crudapp.model.User"*/-->
    <form id="addform" action="add" method="post" th:object="addeduser">
        <input type="number" th:field="${addeduser.id}">
        <input type="text" th:field="${addeduser.name}">
        <input type="text" th:field="${addeduser.phoneNumber}">
        <button type="submit" >ADD</button>
    </form>
<p>some text</p>
<h2>Users table</h2>
<table>
  <thead>
    <th>id</th>
    <th>name</th>
    <th>phonenumber</th>
  </thead>
    <tbody>
        <!--/*@thymesVar id="users" type="java.util.List<crudapp.model.User>"*/-->
        <tr th:each="user : ${users}">
            <form method="post" th:if="${users != null}">
            <td>
                <input type="number" th:field="${user.id}">
            </td>
            <td>
                <input type="text" th:field="${user.name}">
            </td>
            <td>
                <input type="text" th:field="${user.phoneNumber}">
            </td>
            <td>
                <button type="submit" th:text="Save" formaction="@{/update}">UPDATE</button>
            </td>
            <td>
                <button type="submit" th:text="Delete" formaction="@{/delete}">DELETE</button>
            </td>
            </form>
        </tr>
    </tbody>
</table>
</body>
</html>
